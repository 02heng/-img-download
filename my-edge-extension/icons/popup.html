<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 10px;
    }
    .filter-section {
      margin-bottom: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }
    .filter-row label {
      margin-right: 10px;
      min-width: 80px;
    }
    input[type="number"] {
      width: 80px;
      margin: 0 5px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      cursor: pointer;
    }
    #imageList {
      max-height: 300px;
      overflow-y: auto;
    }
    .image-item {
      margin: 5px 0;
      padding: 5px;
      border: 1px solid #ccc;
      display: flex;
      align-items: start;
      gap: 10px;
    }
    .image-info {
      flex: 1;
      font-size: 12px;
    }
    .folder-input {
      margin: 10px 0;
      width: 100%;
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .checkbox-wrapper {
      padding-top: 20px;
    }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin: 10px 0;
      background-color: #f8f8f8;
      transition: all 0.3s ease;
    }
    .drop-zone.dragover {
      background-color: #e3f2fd;
      border-color: #2196f3;
    }
    .drop-zone-text {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="filter-section">
    <div class="filter-row">
      <label>最小宽度:</label>
      <input type="number" id="minWidth" min="0" value="0"> px
    </div>
    <div class="filter-row">
      <label>最小高度:</label>
      <input type="number" id="minHeight" min="0" value="0"> px
    </div>
    <div class="filter-row">
      <label>保存目录:</label>
      <input type="text" id="saveFolder" placeholder="请输入保存路径，例如: D:\Downloads\Images">
    </div>
  
    <button id="selectAll">全选</button>
    <button id="downloadSelected">下载选中图片</button>
  
    <div id="imageList"></div>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-text">将图片拖拽到此处自动下载</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
